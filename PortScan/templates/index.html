<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💥 PortScanner - Ultra Fast Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #0b0f19; }
        .cyber-panel { background-color: #111827; border: 1px solid #1f2937; }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen">

    <header class="border-b border-gray-800 bg-gray-900/50 backdrop-blur-md p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wider text-red-500 flex items-center gap-2">
                👹 PortScanner <span class="text-xs bg-red-900/50 text-red-400 px-2 py-0.5 rounded border border-red-700">TURBO-STREAM</span>
            </h1>
            <span class="text-sm text-gray-400">Sistem: <span id="globalStatus" class="text-green-400 font-bold">READY</span></span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="cyber-panel p-6 rounded-xl shadow-xl h-fit">
            <h2 class="text-lg font-bold text-gray-300 mb-4 border-b border-gray-800 pb-2">🎯 Agresif Konfigürasyon</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Hedef IP / Domain</label>
                    <input type="text" id="target" value="127.0.0.1" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-green-400 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Port Filtresi</label>
                    <input type="text" id="ports" value="1-2000" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-gray-300 focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Hız (Eşzamanlı)</label>
                        <input type="number" id="rate_limit" value="1000" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-gray-300 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs uppercase font-bold text-gray-400 mb-1">Timeout (sn)</label>
                        <input type="number" step="0.1" id="timeout" value="0.2" class="w-full bg-gray-950 border border-gray-800 rounded p-2 text-gray-300 focus:outline-none">
                    </div>
                </div>
                <button id="startBtn" onclick="startScan()" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded transition cursor-pointer mt-2">
                    ROKETLE!
                </button>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6">
            <div class="cyber-panel p-4 rounded-xl">
                <div class="flex justify-between text-sm mb-1">
                    <span id="statusText" class="text-gray-400">Taktiksel analiz bekleniyor...</span>
                    <span id="progressText" class="font-bold text-cyan-400">0%</span>
                </div>
                <div class="w-full bg-gray-950 rounded-full h-2.5 overflow-hidden border border-gray-800">
                    <div id="progressBar" class="bg-cyan-500 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div class="cyber-panel rounded-xl overflow-hidden shadow-xl">
                <div class="bg-gray-900/80 p-4 border-b border-gray-800 flex justify-between items-center">
                    <h3 class="font-bold text-gray-200">🔍 Real-Time Bulunan Portlar</h3>
                    <span id="counter" class="text-xs bg-green-950 text-green-400 border border-green-800 px-2 py-1 rounded font-mono">0 PORT</span>
                </div>
                <div class="overflow-x-auto max-h-[450px]">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-950 text-gray-400 text-xs uppercase border-b border-gray-800">
                                <th class="p-4">Port</th>
                                <th class="p-4">Durum</th>
                                <th class="p-4">Servis</th>
                                <th class="p-4">Bilgi</th>
                            </tr>
                        </thead>
                        <tbody id="resultBody" class="divide-y divide-gray-800/50 text-sm">
                            <tr>
                                <td colspan="4" class="p-8 text-center text-gray-500 italic">Hazır.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        let ws;
        let openPortCount = 0;

        function startScan() {
            const target = document.getElementById("target").value;
            const ports = document.getElementById("ports").value;
            const rate_limit = document.getElementById("rate_limit").value;
            const timeout = document.getElementById("timeout").value;
            
            const startBtn = document.getElementById("startBtn");
            const resultBody = document.getElementById("resultBody");
            const progressBar = document.getElementById("progressBar");
            const progressText = document.getElementById("progressText");
            const statusText = document.getElementById("statusText");
            const counter = document.getElementById("counter");

            resultBody.innerHTML = ""; // Tabloyu temizle, anlık dolacak
            openPortCount = 0;
            progressBar.style.width = "0%"; progressText.innerText = "0%";
            startBtn.disabled = true; startBtn.innerText = "TARANIYOR...";

            ws = new WebSocket(`ws://${window.location.host}/ws/scan`);
            ws.onopen = () => { ws.send(JSON.stringify({ target, ports, rate_limit, timeout })); };

            ws.onmessage = (event) => {
                const response = JSON.parse(event.data);
                
                if (response.type === "info") { 
                    statusText.innerText = response.message; 
                } 
                else if (response.type === "progress") {
                    progressBar.style.width = `${response.progress}%`;
                    progressText.innerText = `${response.progress}%`;
                } 
                else if (response.type === "found") {
                    openPortCount++;
                    counter.innerText = `${openPortCount} PORT AÇIK`;
                    
                    // Port bulduğu salise alta ekler
                    const row = `
                        <tr class="hover:bg-gray-900/30 transition animate-fade-in">
                            <td class="p-4 font-mono text-cyan-400 font-bold">${response.port}</td>
                            <td class="p-4"><span class="bg-green-950 text-green-400 text-xs px-2 py-0.5 rounded border border-green-800 font-bold">OPEN</span></td>
                            <td class="p-4 text-yellow-500 font-medium">${response.service}</td>
                            <td class="p-4 font-mono text-xs text-gray-400">${response.banner}</td>
                        </tr>`;
                    resultBody.innerHTML += row;
                }
                else if (response.type === "completed") {
                    statusText.innerText = "Tarama milisaniyeler içinde tamamlandı!";
                    if(openPortCount === 0) {
                        resultBody.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">Hiç açık port bulunamadı.</td></tr>`;
                    }
                    startBtn.disabled = false; startBtn.innerText = "ROKETLE!";
                }
            };
        }
    </script>
</body>
</html>
